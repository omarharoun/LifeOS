<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!--
      Content-Security-Policy: allow our bundled script + inline <style> (the
      renderer injects its CSS via a <style> tag) and the Google Fonts the
      design uses. No remote scripts. Tightened further in later milestones.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'"
    />
    <title>railway</title>
    <style>
      html, body, #root { height: 100%; margin: 0; }
      /* let the frameless window be dragged by its backdrop; inputs/buttons opt out */
      body { -webkit-app-region: drag; }
      input, textarea, button, .row, .chip { -webkit-app-region: no-drag; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="./dist/bundle.js"></script>
  </body>
</html>
